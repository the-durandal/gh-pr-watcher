name: Build App Artifacts

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            release_build_cmd: npx electron-builder --publish never --linux AppImage
          - os: macos-latest
            release_build_cmd: npx electron-builder --publish never --mac dmg zip
          - os: windows-latest
            release_build_cmd: npx electron-builder --publish never --win nsis

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build app source
        run: npm run build

      - name: Build release artifacts (tag)
        if: startsWith(github.ref, 'refs/tags/v')
        run: ${{ matrix.release_build_cmd }}

      - name: Build packaged app (branch/PR)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run pack

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gh-pr-watcher-${{ matrix.os }}
          path: |
            dist/*.AppImage
            dist/*.dmg
            dist/*.exe
            dist/*.msi
            dist/*.deb
            dist/*.rpm
            dist/*.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release Assets
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: gh-pr-watcher-*
          merge-multiple: true

      - name: Upload assets to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: release-assets/*
          fail_on_unmatched_files: true
