<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GH PR Watcher</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main>
      <h1>GH PR Watcher</h1>

      <section class="card">
        <h2>Config</h2>
        <label>Owner (user or org)
          <input id="org" placeholder="e.g. the-durandal or openai" />
        </label>
        <label>Authors (comma/newline)
          <textarea id="authors" rows="4" placeholder="alice, bob, carol"></textarea>
        </label>
        <label>Interval (minutes)
          <input id="interval" type="number" min="1" step="1" />
        </label>
        <div class="row">
          <button id="saveBtn">Save</button>
          <button id="checkBtn">Check now</button>
          <button id="reloadBtn">Reload state</button>
        </div>
        <p id="authStatus" class="muted"></p>
        <p id="status" class="muted"></p>
        <p id="diag" class="muted"></p>
      </section>

      <section class="card">
        <div class="header-row">
          <h2>Notification Center</h2>
          <button id="clearAlertsBtn" class="danger">Clear all</button>
        </div>
        <div id="alerts"></div>
      </section>

      <section class="card">
        <div class="header-row">
          <h2>Logs</h2>
          <div class="row-tight">
            <button id="logsToggleBtn" class="secondary">Show</button>
            <button id="clearLogsBtn" class="danger">Clear</button>
          </div>
        </div>
        <div id="logsContainer">
          <div id="logs"></div>
        </div>
      </section>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
